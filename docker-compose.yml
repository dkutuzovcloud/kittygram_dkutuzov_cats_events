version: '3.8'

services:
  kittygram:
    image: ${DOCKER_IMAGE}
    ports:
      - "${APP_PORT}:8000"
    restart: always
    volumes:
      - kittygram_data:/app

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kittygram
    restart: always

volumes:
  kittygram_data:
